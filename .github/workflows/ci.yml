name: CI

# Runs on every push and every pull request — this is the "on code change"
# trigger that makes it CI, not a scheduler.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false            # let all Python versions report, don't stop at first red
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        # The project itself is stdlib-only, so the only things to install are
        # the test tools. If you add a requirements.txt later, add:
        #   pip install -r requirements.txt
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run the test suite with coverage
        # Coverage reflects the unit tests, which import can_bus_sim directly.
        # The integration tests run the CLI in a subprocess, so they exercise the
        # code but do not show up in this number — that's expected.
        run: python -m pytest -v --cov=can_bus_sim --cov-report=term-missing
